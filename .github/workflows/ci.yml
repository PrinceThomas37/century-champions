name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest

    # Throwaway Postgres for the database-backed integration tests.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Enables the database-backed tests; the harness pushes the schema to this DB.
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cc_test
      # Placeholders so `prisma generate` / `next build` have the vars they expect.
      # The build never connects (all data pages are force-dynamic).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cc_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/cc_test
      SESSION_SECRET: ci-test-secret
      ADMIN_PASSWORD: ci-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (unit + integration)
        run: npm test

      - name: Production build
        run: npm run build
